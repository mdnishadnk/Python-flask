<!DOCTYPE html>
<html>
<head>
    <title>Rotating Tea Cup</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        
        .cup {
            width: 150px;
            height: 150px;
            background: url("/static/teacup.png") no-repeat center;
            background-size: contain;
            animation: zoom 3s ease-in-out infinite;
        }
        
        @keyframes zoom {
            transform: scale(1.5) rotateY(20deg);
            0%   { transform: scale(1); }
            50%  { transform: scale(1.5); }  /* maximum zoom in */
            100% { transform: scale(1); }    /* zoom out back to normal */
        }

    </style>
</head>
<body>
    <div class="cup"></div>
</body>
</html>
