<!DOCTYPE html>
<html>
<head>
    <title>Green Teees</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f5fff5;
            color: #333;
        }

        header {
            background-color: #2e7d32;
            color: white;
            padding: 20px;
            font-size: 2em;
            font-weight: bold;
            text-align: center;
        }

        .hero {
            display: flex;
            justify-content: space-between; /* 👈 pushes content apart */
            align-items: center;
            height: 80vh;
            padding: 0 40px; /* spacing from edges */
        }

        .text-block {
            max-width: 50%;
        }

        .cup {
            width: 150px;
            height: 150px;
            background: url("/static/teacup.png") no-repeat center;
            background-size: contain;
            animation: zoom 3s ease-in-out infinite;
        }

        @keyframes zoom {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.5); }
            100% { transform: scale(1); }
        }

        footer {
            background-color: #e0e0e0;
            padding: 10px;
            font-size: 0.9em;
            text-align: center;
        }

        .tagline {
            font-size: 1.5em;
            color: #2e7d32;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <header>
        Green Teees
    </header>

    <div class="hero">
        <div class="text-block">
            <div class="tagline">Refreshing taste, naturally brewed.</div>
        </div>
        <div class="cup"></div> <!-- 👈 now aligned to the right -->
    </div>

    <footer>
        © 2026 Green Teees. All rights reserved.
    </footer>
</body>
</html>
