<!DOCTYPE html>
<html>
<head>
    <title>Rotating Tea Cup</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .cup {
            width: 150px;
            height: 150px;
            background: url("/static/teacup.png") no-repeat center;
            background-size: contain;
            animation: spin 10s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="cup"></div>
</body>
</html>
